<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <title>Ignite</title>
  <script>
    // Fast-connect: open Discord gateway WebSocket before the JS bundle loads.
    // Buffers incoming messages so the gateway worker can replay them on startup.
    !function(){
      if (!window.WebSocket) return;
      var token;
      try { token = localStorage.getItem("discord_token"); } catch(e) { return; }
      if (!token) return;

      var url = "wss://gateway.discord.gg/?encoding=json&v=9&compress=zlib-stream";
      console.log("[FAST CONNECT] " + url);

      var ua = navigator.userAgent;
      var n = window.IgniteNative;
      var osName = n ? ({ darwin: "Mac OS X", linux: "Linux", win32: "Windows" }[n.platform] || "Windows") : (/Mac/.test(ua) ? "Mac OS X" : /Linux/.test(ua) ? "Linux" : "Windows");
      var osVersion = n ? n.osVersion : (ua.match(/Windows NT ([\d.]+)/)||[])[1] || "10.0.19045";
      var arch = n ? n.arch : "x64";
      var electronMatch = ua.match(/Electron\/([\d.]+)/);
      var browserVersion = n ? n.electronVersion : (electronMatch ? electronMatch[1] : "0.0.0.0");

      var identify = JSON.stringify({
        op: 2,
        d: {
          token: token,
          capabilities: 1734653,
          properties: {
            os: osName,
            browser: "Discord Client",
            release_channel: "stable",
            client_version: "1.0.9229",
            os_version: osVersion,
            os_arch: arch,
            app_arch: arch,
            system_locale: navigator.language || "en-US",
            has_client_mods: false,
            browser_user_agent: navigator.userAgent,
            browser_version: browserVersion,
            os_sdk_version: osVersion.split(".").pop() || "",
            client_build_number: 514705,
            native_build_number: 77563,
            client_event_source: null,
            is_fast_connect: true
          },
          client_state: { guild_versions: {} }
        }
      });

      var ws = new WebSocket(url);
      ws.binaryType = "arraybuffer";
      var start = Date.now();
      // messages are now ArrayBuffer (zlib-compressed binary frames)
      var state = { open: false, identified: false, messages: [] };

      ws.onopen = function() {
        console.log("[FAST CONNECT] connected in " + (Date.now() - start) + "ms");
        state.open = true;
        ws.send(identify);
        state.identified = true;
        console.log("[FAST CONNECT] IDENTIFY sent");
      };

      ws.onclose = ws.onerror = function() {
        window._ws = null;
      };

      ws.onmessage = function(event) {
        state.messages.push(event.data);
      };

      window._ws = { ws: ws, state: state };
    }();
  </script>
</head>

<body class="dark bg-body text-white overflow-hidden">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
